<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-lg text-center border-0 rounded-4 overflow-hidden">
        
        <div class="position-relative" style="height: 350px;">
          <img [src]="eventos[indiceActivo].img" 
               [alt]="eventos[indiceActivo].nombre" 
               class="w-100 h-100 object-fit-cover">
          <div class="position-absolute bottom-0 start-0 w-100 bg-dark bg-opacity-50 text-white p-3">
            <h3 class="m-0 fs-4 fw-bold">{{ eventos[indiceActivo].nombre }}</h3>
          </div>
        </div>

        <div class="card-body p-4">
          <p class="card-text text-muted fs-5">
            {{ eventos[indiceActivo].descripcion }}
          </p>
          
          <div class="d-flex justify-content-between align-items-center mt-4">
            <button class="btn btn-outline-primary px-4 rounded-pill d-flex align-items-center gap-2" 
                    (click)="anterior()">
              <i class="bi bi-chevron-left"></i> Anterior
            </button>
            
            <span class="badge bg-secondary px-3 py-2 rounded-pill fs-6">
              {{ indiceActivo + 1 }} / {{ eventos.length }}
            </span>
            
            <button class="btn btn-outline-primary px-4 rounded-pill d-flex align-items-center gap-2" 
                    (click)="siguiente()">
              Siguiente <i class="bi bi-chevron-right"></i>
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
